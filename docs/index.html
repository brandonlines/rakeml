<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>100 Days of Python for Siloxane Chemistry (Interactive)</title><link rel="stylesheet" href="assets/styles.css"/></head>
<body>
<header><div class="wrap">
<div class="row" style="justify-content:space-between;align-items:flex-end;">
<div><h1 class="h1">100 Days of Python for Siloxane Chemistry (Interactive)</h1><p class="sub">100 day pages • checklist • quiz • live Python task (Pyodide)</p></div>
<div style="text-align:right;"><div><b id="doneCount">0</b> / 100 done</div>
<div class="progress" style="width:220px;"><div class="bar" id="bar"></div></div><small>Saved in your browser</small></div>
</div></div></header>
<main class="wrap">
<div class="card"><div class="controls">

<select id="filter"><option value="all">All Tracks</option></select>
<button class="btn" id="reset">Reset Progress</button>
<a class="btn primary" href="day-001.html">Start Day 1</a>
</div><div class="grid" id="grid"></div></div>
</main>
<script src="assets/theme.js"></script>
<script>
const PAYLOAD={"title": "100 Days of Python for Siloxane Chemistry (Interactive)", "days": [{"day": 1, "track": "Foundations", "task": "Environment + reproducibility"}, {"day": 2, "track": "Foundations", "task": "Data models for chemistry"}, {"day": 3, "track": "Foundations", "task": "Units + constraints"}, {"day": 4, "track": "Foundations", "task": "CLI + logging basics"}, {"day": 5, "track": "Foundations", "task": "Testing + CI"}, {"day": 6, "track": "Foundations", "task": "Packaging"}, {"day": 7, "track": "Foundations", "task": "Notebook hygiene"}, {"day": 8, "track": "Foundations", "task": "Data I/O patterns"}, {"day": 9, "track": "Foundations", "task": "Visualization"}, {"day": 10, "track": "Foundations", "task": "Checkpoint build (Formulation Calculator + unit-safe schema checks)"}, {"day": 11, "track": "Data", "task": "Large noisy datasets"}, {"day": 12, "track": "Data", "task": "Dataset versioning"}, {"day": 13, "track": "Data", "task": "QC joins + provenance"}, {"day": 14, "track": "Data", "task": "Outlier handling"}, {"day": 15, "track": "Data", "task": "Feature store thinking"}, {"day": 16, "track": "Data", "task": "Data validation pipelines"}, {"day": 17, "track": "Data", "task": "Time drift"}, {"day": 18, "track": "Data", "task": "Storage + formats"}, {"day": 19, "track": "Data", "task": "Experiment registry"}, {"day": 20, "track": "Data", "task": "Checkpoint build (Batchbook + QC analytics notebook (noisy data handling))"}, {"day": 21, "track": "Stats", "task": "Modeling assumptions"}, {"day": 22, "track": "Stats", "task": "Uncertainty"}, {"day": 23, "track": "Stats", "task": "ANOVA/DoE framing"}, {"day": 24, "track": "Stats", "task": "Interactions"}, {"day": 25, "track": "Stats", "task": "Response surfaces"}, {"day": 26, "track": "Stats", "task": "Diagnostics"}, {"day": 27, "track": "Stats", "task": "Power/replicates"}, {"day": 28, "track": "Stats", "task": "Reporting"}, {"day": 29, "track": "Stats", "task": "From DoE to BO"}, {"day": 30, "track": "Stats", "task": "Checkpoint build (DoE + response-surface modeling template)"}, {"day": 31, "track": "Polymer", "task": "Polymer-aware representations"}, {"day": 32, "track": "Polymer", "task": "Functional group counting"}, {"day": 33, "track": "Polymer", "task": "RDKit boundary"}, {"day": 34, "track": "Polymer", "task": "Sampling distributions"}, {"day": 35, "track": "Polymer", "task": "Mixtures"}, {"day": 36, "track": "Polymer", "task": "Schema evolution"}, {"day": 37, "track": "Polymer", "task": "Serialization"}, {"day": 38, "track": "Polymer", "task": "Property annotations"}, {"day": 39, "track": "Polymer", "task": "Interfacing to ML"}, {"day": 40, "track": "Polymer", "task": "Checkpoint build (SiloxaneSpec: polymer-aware representation + functional group bookkeeping)"}, {"day": 41, "track": "Kinetics", "task": "ODEs"}, {"day": 42, "track": "Kinetics", "task": "Hydrosilylation kinetics"}, {"day": 43, "track": "Kinetics", "task": "Arrhenius fitting"}, {"day": 44, "track": "Kinetics", "task": "Noisy curves"}, {"day": 45, "track": "Kinetics", "task": "Uncertainty"}, {"day": 46, "track": "Kinetics", "task": "Bayesian fitting (optional)"}, {"day": 47, "track": "Kinetics", "task": "Model selection"}, {"day": 48, "track": "Kinetics", "task": "Coupling to properties"}, {"day": 49, "track": "Kinetics", "task": "Experiment design"}, {"day": 50, "track": "Kinetics", "task": "Checkpoint build (Cure kinetics model (ODE fit + Arrhenius + uncertainty))"}, {"day": 51, "track": "Properties", "task": "Viscosity models"}, {"day": 52, "track": "Properties", "task": "Thermodynamics hooks"}, {"day": 53, "track": "Properties", "task": "Phase diagrams"}, {"day": 54, "track": "Properties", "task": "Hydrogen bonding effects"}, {"day": 55, "track": "Properties", "task": "Cost + constraints"}, {"day": 56, "track": "Properties", "task": "Unit-safe calculators"}, {"day": 57, "track": "Properties", "task": "Calibration"}, {"day": 58, "track": "Properties", "task": "Model cards"}, {"day": 59, "track": "Properties", "task": "Packaging"}, {"day": 60, "track": "Properties", "task": "Checkpoint build (Property & cost scorer (constraints + BOM rollup))"}, {"day": 61, "track": "ML", "task": "Torch training loop"}, {"day": 62, "track": "ML", "task": "Reproducibility"}, {"day": 63, "track": "ML", "task": "Experiment tracking"}, {"day": 64, "track": "ML", "task": "Hyperparameter search"}, {"day": 65, "track": "ML", "task": "RDKit features"}, {"day": 66, "track": "ML", "task": "Large data"}, {"day": 67, "track": "ML", "task": "Evaluation"}, {"day": 68, "track": "ML", "task": "Deployment"}, {"day": 69, "track": "ML", "task": "Monitoring"}, {"day": 70, "track": "ML", "task": "Checkpoint build (Property predictor (PyTorch-style patterns) + experiment tracking (W&B/MLflow hooks))"}, {"day": 71, "track": "Optimization", "task": "Random/grid baselines"}, {"day": 72, "track": "Optimization", "task": "Bayesian optimization"}, {"day": 73, "track": "Optimization", "task": "Constraints"}, {"day": 74, "track": "Optimization", "task": "Active learning"}, {"day": 75, "track": "Optimization", "task": "Failure modes"}, {"day": 76, "track": "Optimization", "task": "Multi-objective"}, {"day": 77, "track": "Optimization", "task": "RL framing (optional)"}, {"day": 78, "track": "Optimization", "task": "Campaign orchestration"}, {"day": 79, "track": "Optimization", "task": "Cloud/HPC hooks"}, {"day": 80, "track": "Optimization", "task": "Checkpoint build (Active-learning campaign runner (Optuna/BO loop) with failure modes)"}, {"day": 81, "track": "Ops", "task": "SPC"}, {"day": 82, "track": "Ops", "task": "Data pipelines"}, {"day": 83, "track": "Ops", "task": "Docker basics"}, {"day": 84, "track": "Ops", "task": "Cloud basics"}, {"day": 85, "track": "Ops", "task": "HPC batch compute"}, {"day": 86, "track": "Ops", "task": "ML infra hygiene"}, {"day": 87, "track": "Ops", "task": "Noisy sensors"}, {"day": 88, "track": "Ops", "task": "Release rules"}, {"day": 89, "track": "Ops", "task": "Dashboards"}, {"day": 90, "track": "Ops", "task": "Checkpoint build (Ops dashboard + release rules + drift monitoring)"}, {"day": 91, "track": "Capstone", "task": "Capstone spec"}, {"day": 92, "track": "Capstone", "task": "Simulator"}, {"day": 93, "track": "Capstone", "task": "Modeling"}, {"day": 94, "track": "Capstone", "task": "Optimization"}, {"day": 95, "track": "Capstone", "task": "Infra"}, {"day": 96, "track": "Capstone", "task": "Tracking"}, {"day": 97, "track": "Capstone", "task": "HPC/Cloud"}, {"day": 98, "track": "Capstone", "task": "Docs"}, {"day": 99, "track": "Capstone", "task": "Hardening"}, {"day": 100, "track": "Capstone", "task": "Checkpoint build (Capstone demo: lab-in-the-loop simulator + reproducible pipeline)"}], "checkpoints": {"10": "Formulation Calculator + unit-safe schema checks", "20": "Batchbook + QC analytics notebook (noisy data handling)", "30": "DoE + response-surface modeling template", "40": "SiloxaneSpec: polymer-aware representation + functional group bookkeeping", "50": "Cure kinetics model (ODE fit + Arrhenius + uncertainty)", "60": "Property & cost scorer (constraints + BOM rollup)", "70": "Property predictor (PyTorch-style patterns) + experiment tracking (W&B/MLflow hooks)", "80": "Active-learning campaign runner (Optuna/BO loop) with failure modes", "90": "Ops dashboard + release rules + drift monitoring", "100": "Capstone demo: lab-in-the-loop simulator + reproducible pipeline"}};
const STORAGE_DONE="siloxane100days_done_v2";
function loadDone(){try{const r=localStorage.getItem(STORAGE_DONE);return r?new Set(JSON.parse(r)):new Set();}catch(e){return new Set();}}
function saveDone(s){localStorage.setItem(STORAGE_DONE,JSON.stringify(Array.from(s).sort((a,b)=>a-b)));}
function tracks(){return ["all"].concat(Array.from(new Set(PAYLOAD.days.map(d=>d.track))));}
function isCP(day){return PAYLOAD.checkpoints && Object.prototype.hasOwnProperty.call(PAYLOAD.checkpoints,String(day));}
function stats(){const d=loadDone();document.getElementById("doneCount").textContent=String(d.size);document.getElementById("bar").style.width=Math.round(d.size)+"%";}
function renderFilter(){const sel=document.getElementById("filter");sel.innerHTML="";for(const t of tracks()){const o=document.createElement("option");o.value=t;o.textContent=t==="all"?"All Tracks":t;sel.appendChild(o);}}
function render(){const done=loadDone();const q=(document.getElementById("search").value||"").trim().toLowerCase();const f=document.getElementById("filter").value;
const g=document.getElementById("grid");g.innerHTML="";let v=0;
for(const item of PAYLOAD.days){const hay=(String(item.day)+" "+item.track+" "+item.task).toLowerCase();
if(q && hay.indexOf(q)===-1) continue; if(f!=="all" && item.track!==f) continue; v++;
const el=document.createElement("div");el.className="item";
const num=document.createElement("div");const doneFlag=done.has(item.day);const cp=isCP(item.day);
num.className="num"+(doneFlag?" done":"")+(cp?" cp":"");num.textContent=String(item.day).padStart(2,"0");
const meta=document.createElement("div");
const top=document.createElement("div");top.className="row";top.style.justifyContent="space-between";
const task=document.createElement("div");task.className="task";task.textContent=item.task;
const tag=document.createElement("div");tag.className="tag";tag.textContent=item.track+(cp?" • Checkpoint":"");
top.appendChild(task);top.appendChild(tag);
const desc=document.createElement("div");desc.className="desc";desc.textContent=cp?PAYLOAD.checkpoints[String(item.day)]:"Open day page for checklist, quiz, and live code.";
const actions=document.createElement("div");actions.className="row";actions.style.marginTop="10px";
const open=document.createElement("a");open.className="btn primary";open.href="day-"+String(item.day).padStart(3,"0")+".html";open.textContent="Open Day";
const toggle=document.createElement("button");toggle.className="btn";toggle.textContent=doneFlag?"Mark not done":"Mark done";
toggle.onclick=()=>{const nd=loadDone();nd.has(item.day)?nd.delete(item.day):nd.add(item.day);saveDone(nd);stats();render();};
actions.appendChild(open);actions.appendChild(toggle);
meta.appendChild(top);meta.appendChild(desc);meta.appendChild(actions);
el.appendChild(num);el.appendChild(meta);g.appendChild(el);
}
if(v===0){const e=document.createElement("div");e.style.color="var(--muted)";e.textContent="No matching days.";g.appendChild(e);}
}
document.getElementById("search").addEventListener("input",render);
document.getElementById("filter").addEventListener("change",render);
document.getElementById("reset").addEventListener("click",()=>{localStorage.removeItem(STORAGE_DONE);stats();render();});
renderFilter();stats();render();
</script></body></html>
